<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk — SPPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-wrap">
  <div class="login-side">
    <span class="brand-mark">01</span>
    <h1>SPPG</h1>
    <p>Sistem Manajemen Karyawan SPPG</p>
  </div>

  <div class="login-card">
    <p class="eyebrow">Masuk ke Akun</p>
    <h2>Selamat Datang Kembali</h2>

    <form id="loginForm">
      <div class="form-row">
        <label>Username</label>
        <input type="text" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      <p class="login-error" id="loginError" hidden></p>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Masuk</button>
    </form>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="auth.js"></script>
<script src="login.js"></script>
</body>
</html>
