<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan — SPPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">01</span>
      <div><h1>SPPG</h1><p>Manajemen Karyawan</p></div>
    </div>
    <nav class="nav">
      <a class="nav-item" href="dashboard.html"><span class="nav-tag">◆</span> Dashboard</a>
      <a class="nav-item" href="karyawan.html"><span class="nav-tag">A</span> Karyawan</a>
      <a class="nav-item" href="departemen.html"><span class="nav-tag">B</span> Departemen</a>
      <a class="nav-item" href="cuti.html"><span class="nav-tag">C</span> Pengajuan Cuti</a>
      <a class="nav-item active" href="pengaturan.html"><span class="nav-tag">⚙</span> Pengaturan</a>
    </nav>
    <div class="sidebar-user">
      <div class="user-info">
        <strong id="sidebarUserName">—</strong>
        <span id="sidebarUserRole">—</span>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" id="logoutBtn">Keluar</button>
    </div>
  </aside>

  <main class="main">
    <header class="panel-header">
      <div>
        <p class="eyebrow">Akun</p>
        <h2>Pengaturan</h2>
      </div>
    </header>

    <div class="settings-card">
      <h3>Ubah Password</h3>
      <p class="settings-hint">Masukkan password lama untuk konfirmasi, dan masukkan password baru (minimal 6 karakter).</p>

      <form id="changePasswordForm">
        <div class="form-row">
          <label>Password Lama</label>
          <input type="password" name="password_lama" required autocomplete="current-password">
        </div>
        <div class="form-row">
          <label>Password Baru</label>
          <input type="password" name="password_baru" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-row">
          <label>Konfirmasi Password Baru</label>
          <input type="password" name="password_konfirmasi" required minlength="6" autocomplete="new-password">
        </div>
        <p class="login-error" id="formError" hidden></p>
        <button type="submit" class="btn btn-primary" id="submitBtn">Simpan Password Baru</button>
      </form>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="auth.js"></script>
<script src="pengaturan.js"></script>
</body>
</html>
